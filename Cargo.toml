[package]
name = "clingate"
version = "0.1.0"
edition = "2024"
resolver = "2"

[dependencies]
dioxus = { version = "0.7.3", features = ["router"] }
plotters = "0.3.5"
thiserror = "2.0.12"
# polars = {version = "0.53", default-features = false}
# tokio = { version = "1", default-features = false, features = ["macros", "rt-multi-thread"] }
tokio = { version = "1", default-features = false, features = ["macros", "sync", "rt-multi-thread"] }
anyhow = "1"
flow-fcs = {git="https://github.com/jrmoynihan/flow", rev="cea03b0"}
flow-plots = {git="https://github.com/jrmoynihan/flow", rev="cea03b0"}
flow-gates = {git="https://github.com/jrmoynihan/flow", rev="cea03b0"}
base64 = "0.22.1"
plotters-bitmap = "0.3.3"
dioxus-primitives = { git = "https://github.com/DioxusLabs/components", version = "0.0.1", default-features = false }
rustc-hash = "2.1"
indexmap = "2.1"

# [target.'cfg(windows)'.dependencies]
# polars = {version = "0.53", default-features = false, features = ["lazy", "performant", "timezones"]}
polars = {version = "0.53", default-features = false, features = ["lazy", "performant"]}


[features]
default = ["desktop"]
desktop = ["dioxus/desktop"]